simulation:
  box_size_mpc: 150.0
  n_particles: 300000
  n_steps: 700
  z_start: 5.0
  z_end: 0.0
  seed: 42
  theta: 0.7

physics:
  eta: 0.75
  lambda_base_mpc: 30.0    # Reference point (median)
  r_smooth_mpc: 5.0
  lambda_floor: 0.01
  hubble_friction: true

pm_grid:
  n_cells: 128
  k_min: 2

output:
  dir: output/tour2_runE
  snapshot_redshifts:
    - 5.0
    - 2.0
    - 1.0
    - 0.0
  metrics_every_steps: 25
  save_snapshots: true
